name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_BACKEND: 631568866196.dkr.ecr.us-east-1.amazonaws.com/backend-repo
  ECR_FRONTEND: 631568866196.dkr.ecr.us-east-1.amazonaws.com/frontend-repo
  CLUSTER_NAME: zentra-cluster
  BACKEND_SERVICE: zentra-backend-service
  FRONTEND_SERVICE: zentra-frontend-service

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: ./Backend
        run: npm install

      - name: Run backend tests
        working-directory: ./Backend
        run: npm test

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_BACKEND:latest \
            ./Backend \
            --load

      - name: Push Backend image to ECR
        run: docker push $ECR_BACKEND:latest

      - name: Build Frontend Docker image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_FRONTEND:latest \
            ./Frontend \
            --load

      - name: Push Frontend image to ECR
        run: docker push $ECR_FRONTEND:latest

      - name: Deploy Backend to ECS
        run: |
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $BACKEND_SERVICE \
            --force-new-deployment

      - name: Deploy Frontend to ECS
        run: |
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $FRONTEND_SERVICE \
            --force-new-deployment